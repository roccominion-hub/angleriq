name: Compute Lake Channels

on:
  schedule:
    - cron: '0 8 * * 1'   # Weekly (Mon 08:00 UTC) — populate channels for new lakes
  workflow_dispatch:
    inputs:
      all:
        description: 'Recompute ALL lakes (not just missing)?'
        default: 'false'
        required: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute lake channels
        run: |
          ARGS="--missing"
          if [ "${{ github.event.inputs.all }}" = "true" ]; then ARGS=""; fi
          echo "Running: compute-lake-channels.ts $ARGS"
          npx tsx scripts/ingestion/compute-lake-channels.ts $ARGS
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
